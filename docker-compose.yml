version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: demandai_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: demandai_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  ml-service:
    build: ./ml-service
    container_name: demandai_ml
    ports:
      - '5001:5001'
    environment:
      - MONGO_URI=mongodb://mongo:27017/demandforecast
      - REDIS_URL=redis://redis:6379
      - PORT=5001
      - MODEL_PATH=./models/demand_model.joblib
      - ENSEMBLE_PATH=./models/ensemble_model.joblib
      - CONFORMAL_PATH=./models/conformal_model.joblib
      - CLUSTER_PATH=./models/cluster_models.joblib
      - PPO_SB3_PATH=./models/ppo_sb3.zip
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:4000
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      - ml_models:/app/models
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5001/health']
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: demandai_backend
    ports:
      - '4000:4000'
    environment:
      - MONGO_URI=mongodb://mongo:27017/demandforecast
      - ML_SERVICE_URL=http://ml-service:5001
      - PORT=4000
      - NODE_ENV=development
      - ALLOWED_ORIGINS=http://localhost:3000
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:4000
    container_name: demandai_frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  ml_models:
